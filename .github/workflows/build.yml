name: Build Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  LIDARR_VERSION: '3.1.2.4938'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Download Lidarr reference DLLs
        run: |
          mkdir -p local/lidarr-ref
          curl -sL "https://github.com/Lidarr/Lidarr/releases/download/v${LIDARR_VERSION}/Lidarr.develop.${LIDARR_VERSION}.linux-core-x64.tar.gz" \
            | tar xz --strip-components=1 -C local/lidarr-ref \
              Lidarr/Lidarr.Core.dll \
              Lidarr/Lidarr.Common.dll \
              Lidarr/NLog.dll \
              Lidarr/FluentValidation.dll
          echo "Reference DLLs:"
          ls -la local/lidarr-ref/

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Restore
        run: dotnet restore CoverArtSync/CoverArtSync.csproj

      - name: Build
        run: |
          dotnet build CoverArtSync/CoverArtSync.csproj -c Release \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:AssemblyVersion=${{ steps.version.outputs.version }} \
            -p:TreatWarningsAsErrors=false \
            -p:EnforceCodeStyleInBuild=false \
            -p:Branch="${{ github.ref_name }}" \
            -p:Author="bearinfo" \
            -p:RepoUrl="https://github.com/bearinfo/Lidarr.Plugin.CoverArtSync" \
            --no-restore

      - name: Find plugin output
        id: output
        run: |
          PLUGIN_DIR=$(find . -type d -path "*/_plugins/*" | head -n 1)
          echo "plugin_dir=$PLUGIN_DIR" >> $GITHUB_OUTPUT
          echo "Plugin output: $PLUGIN_DIR"
          ls -la "$PLUGIN_DIR"

      - name: Package plugin
        run: |
          cd "${{ steps.output.outputs.plugin_dir }}"
          zip -r "${{ github.workspace }}/Lidarr.Plugin.CoverArtSync.net8.0.zip" . \
            -x "runtimes/*" \
            -x "*.pdb"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Lidarr.Plugin.CoverArtSync.net8.0.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
